[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
pythonpath = ["."]
addopts = "-m 'not e2e'"
markers = [
    "e2e: End-to-End-Tests mit echtem LLM (explizit aufrufen mit -m e2e)",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.mypy]
strict = true
python_version = "3.11"

[[tool.mypy.overrides]]
module = "jsonpatch"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "anthropic"
ignore_missing_imports = true

# E2E tests and scripts use dynamic typing patterns; suppress strict errors
[[tool.mypy.overrides]]
module = [
    "tests.test_e2e_structurer",
    "tests.test_e2e_specifier",
    "tests.test_e2e_moderator",
    "tests.test_e2e_full_chain",
    "tests.e2e_reisekosten",
    "scripts.validate_e2e_artifacts",
    "conftest",
]
ignore_errors = true

# Fix unused type: ignore comments that were written for older mypy
[[tool.mypy.overrides]]
module = ["tests.test_orchestrator", "tests.test_exploration_mode"]
warn_unused_ignores = false
